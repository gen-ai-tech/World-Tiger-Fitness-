name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # or master (check your branch name)

permissions:
  contents: read
  pages: write
  id-token: write   # ⭐ THIS FIXES YOUR ERROR

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: .   # your website files

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
